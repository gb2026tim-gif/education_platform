# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sfl_user
      POSTGRES_PASSWORD: sfl_password
      POSTGRES_DB: sfl_tournament_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sfl_user -d sfl_tournament_2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sfl_user
      POSTGRES_PASSWORD: sfl_password
      POSTGRES_DB: sfl_tournament_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://sfl_user:sfl_password@db:5432/sfl_tournament_2026
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-jwt-secret-key
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
  postgres_test_data:
  redis_data: