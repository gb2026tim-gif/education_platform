name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint + Type check
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prettier + ESLint
        run: npm run lint

      - name: Svelte type check
        run: npm run check
        env:
          DATABASE_URL: postgresql://sfl_user:sfl_password@localhost:5432/sfl_tournament_2026

  # ──────────────────────────────────────────────
  # 2. Unit tests (Vitest)
  # ──────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ──────────────────────────────────────────────
  # 3. Build check
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://sfl_user:sfl_password@localhost:5432/sfl_tournament_2026

      - name: Build SvelteKit app
        run: npm run build
        env:
          DATABASE_URL: postgresql://sfl_user:sfl_password@localhost:5432/sfl_tournament_2026
          BETTER_AUTH_SECRET: ci-secret-placeholder
          BETTER_AUTH_URL: http://localhost:5173

  # ──────────────────────────────────────────────
  # 4. DB schema + E2E tests (Playwright)
  # ──────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sfl_user
          POSTGRES_PASSWORD: sfl_password
          POSTGRES_DB: sfl_tournament_2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://sfl_user:sfl_password@localhost:5432/sfl_tournament_2026

      - name: Run DB migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://sfl_user:sfl_password@localhost:5432/sfl_tournament_2026

      - name: Seed test data
        run: npm run db:seed
        env:
          DATABASE_URL: postgresql://sfl_user:sfl_password@localhost:5432/sfl_tournament_2026

      - name: Build app
        run: npm run build
        env:
          DATABASE_URL: postgresql://sfl_user:sfl_password@localhost:5432/sfl_tournament_2026
          BETTER_AUTH_SECRET: ci-e2e-secret
          BETTER_AUTH_URL: http://localhost:4173

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://sfl_user:sfl_password@localhost:5432/sfl_tournament_2026
          BETTER_AUTH_SECRET: ci-e2e-secret
          BETTER_AUTH_URL: http://localhost:4173
          REDIS_URL: redis://localhost:6379

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Dump Docker/service logs on failure
        if: failure()
        run: docker ps -a
